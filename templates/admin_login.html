{% extends "base.html" %}
{% block title %}Admin Login - Aluminum Alloy Casting Quality Prediction{% endblock %}
{% block content %}
<div class="container mx-auto p-6 max-w-md">
    <!-- Admin Login Form Section -->
    <section class="bg-gray-800 bg-opacity-80 rounded-lg p-8 shadow-lg fade-in">
        <h2 class="text-3xl font-bold text-white mb-6 flex items-center">
            <i class="fas fa-user-shield mr-2"></i> Admin Login
        </h2>
        {% if msg %}
            <p class="text-red-400 bg-red-900 bg-opacity-50 p-4 rounded-lg mb-6 animate-pulse">{{ msg }}</p>
        {% endif %}
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="name" class="block text-gray-300 font-semibold mb-2">Admin Name</label>
                <input type="text" name="name" id="name" class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-red-500 transition-all duration-300" required>
            </div>
            <div>
                <label for="password" class="block text-gray-300 font-semibold mb-2">Password</label>
                <input type="password" name="password" id="password" class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-red-500 transition-all duration-300" required>
            </div>
            <button type="submit" class="w-full bg-red-600 text-white font-semibold py-3 px-6 rounded-lg hover:bg-red-700 transition-all duration-300 flex items-center justify-center space-x-2">
                <i class="fas fa-lock"></i>
                <span>Secure Login</span>
            </button>
        </form>
    </section>
</div>

<style>
    .fade-in {
        animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
